<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Weekly Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@200;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Design tokens ─── */
    /* These are read by both CSS (via var()) and JavaScript (via getComputedStyle).
       Override them in the mobile breakpoint to keep CSS and JS in sync. */
    :root {
      --cell-h:   48px;
      --cell-gap:  8px;
    }

    /* ─── Reset ─── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

    body {
      font-family: 'Instrument Sans', system-ui, sans-serif;
      background: transparent;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ─── Page wrapper ─── */
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
      max-width: 556px;
    }

    /* ─── Top bar ─── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .top-bar h1 {
      font-size: 40px;
      font-weight: 400;
      font-family: Georgia, serif;
      color: white;
    }

    .add-top-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      background: #1b2755;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      align-self: flex-start;
      margin-top: 8px;
      transition: opacity .15s;
    }
    .add-top-btn:hover  { opacity: .85; }
    .add-top-btn:active { transform: scale(.96); }

    /* ─── Planner card ─── */
    .card {
      background: rgba(4, 4, 7, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      /* Glass border: thin white edge all around, brighter on top to catch light */
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.13);
    }

    /* ─── Week nav ─── */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }
    /* Wrapper for chevron + optional return button on each side.
       flex: 1 makes both sides equal width, keeping the label truly centered. */
    .nav-side {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    /* Right side pushes its content to the right edge */
    .nav-side:last-child { justify-content: flex-end; }
    .return-btn {
      background: rgba(40, 40, 52, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.13);
      border-radius: 12px;
      padding: 4px 8px;
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      line-height: 12px;
      white-space: nowrap;
      transition: opacity .15s;
    }
    .return-btn:hover  { opacity: .75; }
    .return-btn:active { transform: scale(.96); }
    .week-label {
      font-size: 18px;
      font-weight: 400;
      color: white;
    }
    .nav-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 8px;
      color: #b5b9d4;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .14s;
    }
    .nav-btn:hover  { background: rgba(255,255,255,0.15); }
    .nav-btn:active { background: rgba(255,255,255,0.22); transform: scale(.9); }

    /* ─── Day headers ─── */
    .days-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .day-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 4px;
      border-radius: 8px;
    }
    .day-header.today { background: rgba(255,255,255,0.15); }
    .day-date {
      font-size: 20px;
      font-weight: 500;
      color: #e7e9f3;
    }
    .day-name {
      font-size: 12px;
      font-weight: 500;
      color: #b5b9d4;
    }
    .day-header.today .day-date { color: white; }

    /* ─── Tasks grid ─── */
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    /* ─── Task block ─── */
    .task-block {
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 6px;
      cursor: pointer;
      position: relative;
      min-height: 48px;
      transition: filter .12s;
    }
    .task-block:hover { filter: brightness(.93); }

    .task-name {
      font-size: 14px;
      font-weight: 500;
      color: #282834;
      text-align: center;
      word-break: break-word;
      line-height: 1.35;
      font-feature-settings: 'case';
    }

    /* delete × shown on hover */
    .del-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(0,0,0,.13);
      border: none;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #282834;
      line-height: 1;
    }
    .task-block:hover .del-btn { display: flex; }

    /* ─── Drag & Resize ─── */

    /* Normal cursor is "grab"; turns grabbing while actively dragging */
    .task-block { cursor: grab; }

    /* The task being dragged dims in place — it acts as a "ghost origin" */
    .task-block.is-dragging {
      opacity: 0.2;
      pointer-events: none; /* lets mouse events pass through to cells below */
    }

    /* The colored preview that shows where the task will land when you release */
    .drop-preview {
      border-radius: 6px;
      pointer-events: none;
      opacity: 0.5;
      border: 2px dashed rgba(40,40,52,0.35);
    }
    /* Red tint when the drop target is blocked by another task */
    .drop-preview.invalid {
      opacity: 0.4;
      border-color: rgba(220,50,50,0.5);
      background: rgba(220,50,50,0.18) !important;
    }

    /* Invisible hit zones on each task edge — cursor changes reveal them */
    .resize-l, .resize-r {
      position: absolute;
      top: 6px; bottom: 6px;
      width: 10px;
      cursor: ew-resize; /* left-right arrow */
      z-index: 3;
    }
    .resize-l { left:  0; }
    .resize-r { right: 0; }
    .resize-b {
      position: absolute;
      left: 6px; right: 6px; bottom: 0;
      height: 10px;
      cursor: ns-resize; /* up-down arrow */
      z-index: 3;
    }

    /* Tiny grip dots appear on task hover so the user knows edges are draggable */
    .task-block:hover .resize-l::after,
    .task-block:hover .resize-r::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 3px; height: 14px;
      background: rgba(40,40,52,0.22);
      border-radius: 2px;
    }
    .task-block:hover .resize-b::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 14px; height: 3px;
      background: rgba(40,40,52,0.22);
      border-radius: 2px;
    }

    /* ─── Empty add-cell ─── */
    .add-cell {
      min-height: 48px;
      border-radius: 6px;
      border: 2px dashed rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .12s, border-color .12s;
    }
    .add-cell:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
    .add-cell-icon { font-size: 18px; font-weight: 300; color: rgba(255,255,255,0.3); transition: color .12s; }
    .add-cell:hover .add-cell-icon { color: rgba(255,255,255,0.6); }

    /* ─── Footer button ─── */
    .footer-row { display: none; }
    .add-task-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 11px 26px;
      background: #282834;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: opacity .14s;
    }
    .add-task-btn:hover { opacity: .8; }

    /* ─── Modal overlay ─── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(30,30,50,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      padding: 16px;
      backdrop-filter: blur(3px);
      /* Fade the backdrop in/out instead of instant show/hide */
      opacity: 1;
      transition: opacity .22s ease;
    }
    .overlay.hidden {
      opacity: 0;
      pointer-events: none; /* can't click through it while invisible */
      visibility: hidden;
    }

    /* ─── Modal card ─── */
    .modal {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 12px 48px rgba(30,30,50,.18);
      /* cubic-bezier(0.34, 1.56, 0.64, 1) = spring easing — overshoots slightly then settles */
      animation: popIn .3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal.is-closing {
      /* forwards = keeps the final (invisible) state after animation ends */
      animation: popOut .16s ease-in forwards;
    }
    @keyframes popIn {
      /* Starts smaller + further down, springs into place */
      from { opacity: 0; transform: scale(.88) translateY(20px); }
      to   { opacity: 1; transform: scale(1)   translateY(0);    }
    }
    @keyframes popOut {
      /* Shrinks and fades down before the overlay disappears */
      from { opacity: 1; transform: scale(1)   translateY(0);   }
      to   { opacity: 0; transform: scale(.92) translateY(10px); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: #282834;
    }
    .trash-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border: none;
      background: none;
      border-radius: 8px;
      color: #a0a0b0;
      cursor: pointer;
      transition: color .15s, background .15s;
    }
    .trash-btn:hover  { color: #e03535; background: rgba(220, 40, 40, 0.08); }
    .trash-btn:active { transform: scale(.9); }

    /* ─── Form elements ─── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #9c9ebf;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 6px;
    }
    .field input,
    .field select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e8e8f0;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 600;
      color: #282834;
      background: white;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color .14s;
    }
    .field input:focus,
    .field select:focus { border-color: #9c9ebf; }
    .field input.err { border-color: #ff4466; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ─── Color swatches ─── */
    .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
    .swatch {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform .1s, border-color .1s;
    }
    .swatch:hover  { transform: scale(1.12); }
    .swatch:active { transform: scale(0.9); } /* press-down feedback on click */
    .swatch.active { border-color: #282834; transform: scale(1.08); box-shadow: 0 0 0 1px #282834; }

    /* ─── Modal actions ─── */
    .actions { display: flex; gap: 8px; margin-top: 20px; }
    .btn {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: opacity .12s;
    }
    .btn:hover  { opacity: .8; }
    .btn:active { transform: scale(.96); opacity: .9; } /* press-down on click */
    .btn-dark   { background: #282834; color: white; }
    .btn-ghost  { background: #f0f0f8; color: #646587; }
    .btn-danger { background: #ffe0f2; color: #c0185e; }

    /* ─── Background ─── */

    /* Dark base layer */
    #bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: visible; /* allow blobs' blurred edges to bleed beyond viewport without hard clip */
      background: #040407;
    }

    /* All three blobs are absolutely positioned inside #bg */
    #blob1, #blob2, #blob3, #blob4 {
      position: absolute;
      pointer-events: none;
    }

    /*
      Blob 1: BLUE wave shape (Figma node 10:41)
      SVG viewBox is 2568 × 2814 — slightly taller than wide.
      Pushed to the LEFT side: smaller size + more negative left offset.
      The blob should never reach the center of the screen.
    */
    #blob1 {
      width: 105vw;
      height: 115vw;
      left: -58vw; top: 10vh;
      animation: blobFloat1 13s ease-in-out infinite;
    }

    /*
      Blob 2: TEAL wave shape (Figma node 10:40)
      SVG viewBox is 3367 × 2873 — wider than tall.
      Anchored to the BOTTOM-RIGHT using `right` instead of `left`,
      so it stays in the bottom-right corner and never drifts to center.
    */
    #blob2 {
      width: 125vw;
      height: 107vw;
      right: -48vw; bottom: -30vh;
      animation: blobFloat2 17s ease-in-out infinite;
    }

    /*
      Blob 4: deep royal blue — fills the empty left margin.
      Positioned left-center, lower than blob1 so together they
      cover the full left side without merging into the dark center.
    */
    #blob4 {
      width: 60vw; height: 60vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(28, 55, 200, 0.48) 0%, transparent 65%);
      filter: blur(90px);
      left: -12vw; top: 42vh;
      /* Two animations: float (position) + morph (shape). 18s is prime-ish vs 19s float. */
      animation: blobFloat4 19s ease-in-out infinite,
                 blobMorph4 18s ease-in-out infinite alternate;
    }

    /*
      Blob 3: dark indigo — sits in the center to deepen the void
      between the two colored blobs. Bigger and centered so there's
      always a dark area between blue (left) and teal (bottom-right).
    */
    #blob3 {
      width: 130vw; height: 130vw;
      border-radius: 50%;
      /* two-stop gradient: dense dark core fading to nothing */
      background: radial-gradient(circle, rgba(2, 1, 18, 0.96) 0%, rgba(2, 1, 18, 0.72) 40%, rgba(2, 1, 18, 0.25) 62%, transparent 75%);
      filter: blur(80px);
      left: -15vw; top: -15vh;
      /* Two animations: float (position) + morph (shape). 14s is prime-ish vs 22s float. */
      animation: blobFloat3 22s ease-in-out infinite,
                 blobMorph3 14s ease-in-out infinite alternate;
    }

    /*
      Blue blob: rotation (47.18° + skewX 3.72°) in every keyframe.
      Translations kept SMALL (+/-8vw) so the blob stays on the left side
      throughout the entire animation cycle.
    */
    @keyframes blobFloat1 {
      0%   { transform: rotate(47.18deg) skewX(3.72deg) translate(  0vw,   0vh); }
      30%  { transform: rotate(47.18deg) skewX(3.72deg) translate( -4vw,  14vh); }
      55%  { transform: rotate(47.18deg) skewX(3.72deg) translate(  6vw,  22vh); }
      80%  { transform: rotate(47.18deg) skewX(3.72deg) translate(  2vw, -10vh); }
      100% { transform: rotate(47.18deg) skewX(3.72deg) translate(  0vw,   0vh); }
    }

    /*
      Teal blob: anchored bottom-right. Translations kept small to avoid
      drifting left toward the center. Max leftward drift is -10vw.
    */
    @keyframes blobFloat2 {
      0%   { transform: translate(  0vw,   0vh); }
      25%  { transform: translate( -8vw, -28vh); }
      52%  { transform: translate( -4vw, -40vh); }
      78%  { transform: translate(  8vw,   5vh); }
      100% { transform: translate(  0vw,   0vh); }
    }

    /* Left-side blue blob: larger drift so the movement is clearly visible */
    @keyframes blobFloat4 {
      0%   { transform: translate(  0vw,   0vh); }
      28%  { transform: translate( 14vw, -30vh); }
      58%  { transform: translate(  6vw,  32vh); }
      82%  { transform: translate(-10vw,  12vh); }
      100% { transform: translate(  0vw,   0vh); }
    }

    /*
      border-radius morphing for blob3 and blob4 (the pure CSS circles).
      CSS border-radius accepts 8 values: the horizontal and vertical radii for
      each corner independently. By cycling through asymmetric combinations,
      the circle stretches into a lopsided ellipse and back — like a liquid blob
      being gently squeezed from different sides.
    */
    @keyframes blobMorph4 {
      0%   { border-radius: 50%; }
      25%  { border-radius: 62% 38% 50% 50% / 45% 45% 55% 55%; }
      50%  { border-radius: 42% 58% 65% 35% / 55% 40% 60% 45%; }
      75%  { border-radius: 55% 45% 38% 62% / 60% 55% 45% 40%; }
      100% { border-radius: 50%; }
    }

    @keyframes blobMorph3 {
      0%   { border-radius: 50%; }
      33%  { border-radius: 58% 42% 44% 56% / 40% 60% 40% 60%; }
      66%  { border-radius: 44% 56% 60% 40% / 60% 40% 55% 45%; }
      100% { border-radius: 50%; }
    }

    /* Indigo blob: slow, gentle drift — reinforces the central dark void */
    @keyframes blobFloat3 {
      0%   { transform: translate(  0vw,   0vh); }
      35%  { transform: translate( 10vw, -18vh); }
      65%  { transform: translate( -6vw, -30vh); }
      85%  { transform: translate(  8vw,  14vh); }
      100% { transform: translate(  0vw,   0vh); }
    }

    /*
      ─── LAVA LAMP SHAPE MORPHING ───────────────────────────────────────────
      blob1 and blob2 are SVG <path> elements — we animate the `d` attribute
      directly, morphing between 3 versions of the same shape (same command
      count: M + 5 cubic beziers + Z). Anchor and control points shift between
      keyframes so the blob stretches, squishes, and bulges like lava.
      `alternate` means it reverses smoothly instead of jumping back to frame 0.
      Durations are intentionally different from the float animations (11s vs
      13s, 15s vs 17s) so the two cycles never lock into sync.
    */

    /* Blue blob — 11s morph cycle */
    #blob1 path {
      animation: blobMorph1 11s ease-in-out infinite alternate;
    }
    @keyframes blobMorph1 {
      0% {
        d: path('M834.563 1815.83C1592.41 1631.45 1644.17 767.955 1765.47 300C1932.98 686.47 2268 1466.4 2268 1494.33C2268 1529.25 1927.2 2444.21 1898.32 2458.18C1875.22 2469.35 1029.96 2500.09 610.215 2514.06C242.459 2397.65 76.7158 2000.22 834.563 1815.83Z');
      }
      50% {
        /* Stretched taller — top spike pulled higher, sides tucked in slightly */
        d: path('M800 1850C1560 1660 1600 700 1730 160C1900 610 2300 1420 2300 1460C2300 1500 1890 2480 1860 2500C1840 2500 1000 2540 580 2560C220 2430 60 2020 800 1850Z');
      }
      100% {
        /* Squished shorter — wider belly, flatter top */
        d: path('M870 1780C1620 1600 1680 840 1810 420C1970 740 2230 1480 2230 1520C2230 1560 1960 2430 1930 2420C1900 2440 1060 2480 640 2480C260 2370 100 1980 870 1780Z');
      }
    }

    /* Teal blob — 15s morph cycle */
    #blob2 path {
      animation: blobMorph2 15s ease-in-out infinite alternate;
    }
    @keyframes blobMorph2 {
      0% {
        d: path('M1554.91 1513.19C2137.69 1867.31 2291.47 851.946 2295.52 300C2471.57 516.771 2867.37 1140.49 3042.21 1901.19C3260.75 2852.07 1979.85 2551.5 984.268 2431.28C187.803 2335.1 247.7 970.351 377.207 300C526.949 556.846 972.127 1159.07 1554.91 1513.19Z');
      }
      50% {
        /* Spread wider — corners pushed further out, more open shape */
        d: path('M1520 1480C2100 1840 2250 800 2260 200C2440 460 2920 1100 3120 1920C3320 2880 1960 2570 940 2490C160 2350 220 940 340 220C510 540 960 1140 1520 1480Z');
      }
      100% {
        /* Pulled inward — more compact and rounded */
        d: path('M1590 1550C2180 1900 2330 900 2330 390C2510 570 2820 1180 2970 1880C3190 2820 2000 2530 1030 2370C210 2310 270 1000 420 380C540 570 990 1180 1590 1550Z');
      }
    }

    /* Grain overlay — PNG texture tiled at 8% opacity */
    #bg-grain {
      position: absolute;
      inset: 0;
      background-image: url('./bg-grain.png');
      background-size: 1738px 1738px;
      background-repeat: repeat;
      opacity: 0.08;
      mix-blend-mode: overlay;
      pointer-events: none;
      animation: grainShift 0.5s steps(1) infinite;
    }

    @keyframes grainShift {
      0%   { transform: translate(  0%,   0%); }
      17%  { transform: translate( -4%,  -7%); }
      33%  { transform: translate(  6%,  -2%); }
      50%  { transform: translate( -2%,   8%); }
      67%  { transform: translate(  5%,  -5%); }
      83%  { transform: translate( -7%,   3%); }
    }

    /* ─── Mobile (≤ 480px) ─── */
    @media (max-width: 480px) {

      /* Override the gap token so JS reads the correct value */
      :root { --cell-gap: 4px; }

      /* Less outer padding = more usable width (366px instead of 350px). */
      body {
        padding: 12px;
      }

      /* Smaller title — 40px is too dominant on a 390px screen */
      .top-bar h1 { font-size: 24px; }

      /* Remove the top margin that was compensating for the large desktop heading */
      .add-top-btn { margin-top: 0; }

      /* Smaller label fits between the two nav chevrons */
      .week-label { font-size: 14px; }

      /* Tighter day header columns — same 5-column grid, just more compact */
      .days-row   { gap: var(--cell-gap); }
      .day-header { padding: 4px 2px; }
      .day-date   { font-size: 14px; }
      .day-name   { font-size: 10px; }

      /* Tighter task grid — reduces total wasted gap from 32px to 16px,
         giving each of the 5 columns ~70px instead of ~62px */
      .tasks-grid { gap: var(--cell-gap); }

      /* Smaller task text and tighter padding to fit in narrow columns */
      .task-block { padding: 6px 4px; }
      .task-name  { font-size: 12px; }

      /* Larger touch hit zones on resize handles (was 10px, now 14px) */
      .resize-l, .resize-r { width:  14px; }
      .resize-b            { height: 14px; }

      /* Bigger delete button — easier to tap with a finger */
      .del-btn { width: 22px; height: 22px; }

      /* Modal: fill the overlay width and tighten interior spacing */
      .modal {
        max-width: 100%;
        padding: 16px;
      }

      /* Reduce the gap between every form field (was 16px) */
      .field { margin-bottom: 10px; }

      /* Reduce the space below the modal title (was 20px) */
      .modal-header { margin-bottom: 12px; }

      /* Smaller input/select padding — saves ~4px per field */
      .field input,
      .field select { padding: 8px 10px; }

      /* Keep two columns for the day/row selects — they fit fine at 2×~140px
         and this saves two full field-heights compared to stacking them */
      .two-col { grid-template-columns: 1fr 1fr; gap: 8px; }

      /* Slightly larger color swatches for easier tapping */
      .swatch { width: 38px; height: 38px; }

      /* Taller action buttons — easier to tap */
      .btn { padding: 13px; }

      /* Remove the blur behind the modal — it's expensive on mobile GPUs */
      .overlay { backdrop-filter: none; -webkit-backdrop-filter: none; }

      /* The SVG blobs have an internal feGaussianBlur (stdDeviation 150 in SVG units).
         On desktop that equals ~80px of actual blur, but on mobile the SVG shrinks so
         the same value only produces ~20px — the path edges become sharp and visible.
         Adding a CSS-level blur here works in real pixels regardless of SVG scale.
         Rule of thumb: blur needs to be ~25% of the blob's width to fully hide the edge.
         blob2 is ~490px wide on mobile → needs ~120px total → SVG gives ~22px → CSS adds 100px. */
      #blob1, #blob2 { filter: blur(100px); }
    }

    /* ─── Print ─── */
    @media print {
      body { background: white; padding: 12px; }
      #bg { display: none; }
      .page { max-width: 100%; }
      .top-bar .add-top-btn,
      .footer-row,
      .nav-btn,
      .del-btn,
      .add-cell { display: none !important; }
      .card { box-shadow: none; border: 1px solid #e0e0ee; }
      .task-block { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<!-- Background: dark base + 4 CSS gradient blobs + grain texture -->
<div id="bg">
  <!-- Blue wave blob (from Figma node 10:41) — rotated ~47° to create diagonal left-side sweep -->
  <div id="blob1">
    <svg width="100%" height="100%" viewBox="0 0 2568 2814.06" overflow="visible" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g filter="url(#blue-blur)">

      </g>
      <defs>
        <filter id="teal-blur" x="-450" y="-450" width="4266.84" height="3772.76" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
          <feFlood flood-opacity="0" result="BackgroundImageFix"/>
          <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
          <feGaussianBlur stdDeviation="150" result="effect1_foregroundBlur"/>
        </filter>
        <linearGradient id="teal-gradient" x1="2028.41" y1="1436.38" x2="990.339" y2="1436.38" gradientUnits="userSpaceOnUse">

          <stop offset="1" stop-color="#2B72C8"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <div id="blob3"></div>
  <div id="blob4"></div>
  <div id="bg-grain"></div>
</div>

<div class="page">

  <div class="top-bar">

<!-- ─── Modal ─── -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <div class="modal-header">

          <path d="M2 4h12M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1M6 7v5M10 7v5M3 4l1 9a1 1 0 001 1h6a1 1 0 001-1l1-9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <label for="iRow">Row</label>

    <div class="actions" id="actions"></div>

</div><!-- .overlay -->


<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONSTANTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const PALETTE = [
  { name:'Bluebell',  hex:'#def1ff' },
  { name:'Mint',      hex:'#d9faf5' },
  { name:'Lemon',     hex:'#f0fac8' },
  { name:'Sunflower', hex:'#fcf5c7' },
  { name:'Peach',     hex:'#ffdecc' },
  { name:'Rose',      hex:'#ffe0f2' },
  { name:'Lavender',  hex:'#ece8ff' },
  { name:'Gray',      hex:'#f4f5f9' },
];

const DAY_NAMES  = ['Segunda','Terça','Quarta','Quinta','Sexta'];
const PT_MONTHS  = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const NUM_ROWS   = 8; // max selectable rows
const STORAGE_KEY = 'weeklyPlanner_v2';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

let monday    = getMonday(new Date()); // current week start
let tasks     = [];                    // all tasks (all weeks)
let editId    = null;                  // id of task being edited; null = new
let pickColor = PALETTE[0].hex;        // currently selected color in modal

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PERSISTENCE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function loadTasks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) tasks = JSON.parse(raw);
  } catch(e) { tasks = []; }
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DATE HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function getMonday(d) {
  const date = new Date(d);
  date.setHours(0,0,0,0);
  const day = date.getDay();              // 0=Sun, 1=Mon…
  date.setDate(date.getDate() - (day === 0 ? 6 : day - 1));
  return date;
}

function weekDates(mon) {
  return Array.from({length:5}, (_,i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function fmt(d) {
  return `${d.getDate()}/${PT_MONTHS[d.getMonth()]}`;
}

function weekKey(mon) {
  return mon.toISOString().slice(0,10); // "YYYY-MM-DD"
}

function weekRangeLabel(mon) {
  // Compare this week's Monday against today's Monday to get the offset in weeks
  const todayMonday = getMonday(new Date());
  const diffMs = mon.getTime() - todayMonday.getTime();
  const diffWeeks = Math.round(diffMs / (7 * 24 * 60 * 60 * 1000));

  if (diffWeeks === 0)  return 'Current';
  if (diffWeeks === 1)  return 'Next';
  if (diffWeeks === -1) return 'Last';

  // For all other weeks, use Q/R/W notation:
  // Q = quarter (1–4), R = month within quarter (1–3), W = week within month (1–5)
  const month          = mon.getMonth();                // 0–11
  const quarter        = Math.floor(month / 3) + 1;    // 1–4
  const monthInQuarter = (month % 3) + 1;              // 1–3 → R
  const weekInMonth    = Math.ceil(mon.getDate() / 7); // 1–5 → W
  return `[Q${quarter}] R${monthInQuarter}/W${weekInMonth}`;
}

function isToday(d) {
  const t = new Date();
  return d.getDate()  === t.getDate()  &&
         d.getMonth() === t.getMonth() &&
         d.getFullYear() === t.getFullYear();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TASK HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function weekTasks() {
  return tasks.filter(t => t.wk === weekKey(monday));
}

// Is cell (row r, col c) occupied? Optionally exclude one task id.
function cellOccupied(r, c, excludeId=null) {
  return weekTasks().some(t => {
    if (t.id === excludeId) return false;
    return c >= t.c0 && c <= t.c1 &&
           r >= t.r0 && r < t.r0 + t.rs;
  });
}

// Is the whole bounding box free?
function bboxFree(r0, c0, c1, rs, excludeId=null) {
  for (let r = r0; r < r0+rs; r++)
    for (let c = c0; c <= c1; c++)
      if (cellOccupied(r, c, excludeId)) return false;
  return true;
}

// Find first free cell scanning row-by-row
function firstFreeCell() {
  for (let r = 0; r < NUM_ROWS; r++)
    for (let c = 0; c < 5; c++)
      if (!cellOccupied(r, c)) return {r, c};
  return {r: NUM_ROWS, c: 0};
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function render() {
  renderWeekLabel();
  renderDays();
  renderGrid();
}

function renderWeekLabel() {
  document.getElementById('weekLabel').textContent = weekRangeLabel(monday);

  // Show "Go to current" only when more than 1 week away from today
  const diffWeeks = Math.round((monday - getMonday(new Date())) / (7 * 24 * 60 * 60 * 1000));
  document.getElementById('returnBtnLeft').style.display  = diffWeeks >  1 ? 'inline-block' : 'none';
  document.getElementById('returnBtnRight').style.display = diffWeeks < -1 ? 'inline-block' : 'none';
}

function goToCurrent() {
  monday = getMonday(new Date());
  render();
}

function renderDays() {
  const ds = weekDates(monday);
  document.getElementById('daysRow').innerHTML = ds.map((d,i) => `
    <div class="day-header ${isToday(d)?'today':''}">
      <div class="day-date">${fmt(d)}</div>
      <div class="day-name">${DAY_NAMES[i]}</div>
    </div>
  `).join('');
}

function renderGrid() {
  const grid = document.getElementById('tasksGrid');
  const wt   = weekTasks();

  // How many rows to show — expands to accommodate drag/resize previews
  let maxUsedRow = wt.length ? Math.max(...wt.map(t => t.r0 + t.rs - 1)) : 3;
  if (drag) {
    const dt = wt.find(t => t.id === drag.taskId);
    if (dt) maxUsedRow = Math.max(maxUsedRow, drag.previewR0 + dt.rs - 1);
  }
  if (resize) {
    maxUsedRow = Math.max(maxUsedRow, resize.origR0 + resize.previewRs - 1);
  }
  const rows = Math.max(4, maxUsedRow + 1);

  grid.style.gridTemplateRows = `repeat(${rows}, 48px)`;

  // Build occupancy map — the task being dragged/resized is "lifted" off the grid
  // so it doesn't block its own destination cells
  const occ = Array.from({length: rows}, () => new Array(5).fill(false));
  wt.forEach(t => {
    if ((drag && t.id === drag.taskId) || (resize && t.id === resize.taskId)) return;
    for (let r = t.r0; r < t.r0+t.rs && r < rows; r++)
      for (let c = t.c0; c <= t.c1 && c < 5; c++)
        occ[r][c] = true;
  });

  let html = '';

  // Render task blocks
  wt.forEach(t => {
    const isDragging = drag   && t.id === drag.taskId;
    const isResizing = resize && t.id === resize.taskId;

    // While resizing, render the task at its live preview size
    const c0 = isResizing ? resize.previewC0 : t.c0;
    const c1 = isResizing ? resize.previewC1 : t.c1;
    const rs = isResizing ? resize.previewRs : t.rs;

    const extraClass = isDragging ? ' is-dragging' : '';

    html += `
      <div class="task-block${extraClass}"
           style="background:${t.color}; grid-column:${c0+1}/span ${c1-c0+1}; grid-row:${t.r0+1}/span ${rs};"
           onmousedown="startDrag(event,'${t.id}')"
           onclick="if(window.matchMedia('(pointer:coarse)').matches)openEdit('${t.id}')">
        <span class="task-name">${esc(t.name)}</span>
        <button class="del-btn" title="Delete"
                onmousedown="event.stopPropagation()"
                onclick="event.stopPropagation();doDelete('${t.id}')">×</button>
        <div class="resize-l" onmousedown="startResize(event,'${t.id}','left')"></div>
        <div class="resize-r" onmousedown="startResize(event,'${t.id}','right')"></div>
        <div class="resize-b" onmousedown="startResize(event,'${t.id}','bottom')"></div>
      </div>`;
  });

  // Drop preview — the colored ghost showing where the task will land on release
  if (drag) {
    const dt = wt.find(t => t.id === drag.taskId);
    if (dt) {
      const span = dt.c1 - dt.c0;
      const cls  = drag.valid ? '' : 'invalid';
      html += `
        <div class="drop-preview ${cls}"
             style="background:${dt.color}; grid-column:${drag.previewC0+1}/span ${span+1}; grid-row:${drag.previewR0+1}/span ${dt.rs};">
        </div>`;
    }
  }

  // Empty add-cells — hidden during drag/resize to keep the UI clean
  if (!drag && !resize) {
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < 5; c++)
        if (!occ[r][c])
          html += `
            <div class="add-cell"
                 style="grid-column:${c+1}; grid-row:${r+1};"
                 onclick="openAdd(${c},${r})">
              <span class="add-cell-icon">+</span>
            </div>`;
  }

  grid.innerHTML = html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ROW SELECT (dynamic)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function buildRowSelect(selectedRow) {
  const sel = document.getElementById('iRow');
  sel.innerHTML = Array.from({length: NUM_ROWS}, (_,i) =>
    `<option value="${i}" ${i===selectedRow?'selected':''}>Row ${i+1}</option>`
  ).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// COLOR SWATCHES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function renderSwatches() {
  document.getElementById('swatches').innerHTML = PALETTE.map(p => `
    <div class="swatch ${pickColor===p.hex?'active':''}"
         style="background:${p.hex};"
         title="${p.name}"
         onclick="selectColor('${p.hex}')"></div>
  `).join('');
}

function selectColor(hex) {
  pickColor = hex;
  renderSwatches();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MODAL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function openAdd(col=0, row=0) {
  editId = null;
  document.getElementById('trashBtn').style.display = 'none';
  document.getElementById('modalTitle').textContent = 'Add Task';
  document.getElementById('iName').value = '';
  document.getElementById('iName').classList.remove('err');
  document.getElementById('iStart').value = col;
  document.getElementById('iEnd').value   = col;
  buildRowSelect(row);
  document.getElementById('iSpan').value  = 1;
  pickColor = PALETTE[0].hex;
  renderSwatches();
  document.getElementById('actions').innerHTML = `
    <button class="btn btn-ghost"  onclick="closeModal()">Cancel</button>
    <button class="btn btn-dark"   onclick="doSave()">Add</button>
  `;
  showOverlay();
}

function openEdit(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  editId = id;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('iName').value  = t.name;
  document.getElementById('iName').classList.remove('err');
  document.getElementById('iStart').value = t.c0;
  document.getElementById('iEnd').value   = t.c1;
  buildRowSelect(t.r0);
  document.getElementById('iSpan').value  = t.rs;
  pickColor = t.color;
  renderSwatches();
  const trash = document.getElementById('trashBtn');
  trash.style.display = 'flex';
  trash.onclick = () => { doDelete(id); closeModal(); };
  document.getElementById('actions').innerHTML = `
    <button class="btn btn-ghost"  onclick="closeModal()">Cancel</button>
    <button class="btn btn-dark"   onclick="doSave()">Save</button>
  `;
  showOverlay();
}

function showOverlay() {
  const modal = document.querySelector('.modal');
  modal.classList.remove('is-closing'); // cancel any in-progress close animation

  document.getElementById('overlay').classList.remove('hidden');
  requestAnimationFrame(() => {
    const inp = document.getElementById('iName');
    inp.focus(); inp.select();
  });
}

function closeModal() {
  const modal   = document.querySelector('.modal');
  const overlay = document.getElementById('overlay');

  editId = null; // reset immediately so nothing else can accidentally use the old id

  modal.classList.add('is-closing'); // triggers the popOut keyframe

  // Wait for popOut to finish, then actually hide the overlay
  modal.addEventListener('animationend', () => {
    if (modal.classList.contains('is-closing')) { // guard: skip if modal was re-opened before this fired
      overlay.classList.add('hidden');
      modal.classList.remove('is-closing');
    }
  }, { once: true }); // { once: true } = listener auto-removes itself after firing once
}

function doSave() {
  const name = document.getElementById('iName').value.trim();
  if (!name) {
    const inp = document.getElementById('iName');
    inp.classList.add('err');
    inp.focus();
    return;
  }

  let c0 = parseInt(document.getElementById('iStart').value);
  let c1 = parseInt(document.getElementById('iEnd').value);
  if (c1 < c0) c1 = c0; // auto-correct reversed range

  const r0 = parseInt(document.getElementById('iRow').value);
  const rs  = parseInt(document.getElementById('iSpan').value);

  // Collision check
  if (!bboxFree(r0, c0, c1, rs, editId)) {
    alert('That space overlaps with another task.\nChoose a different row or days.');
    return;
  }

  if (editId) {
    const i = tasks.findIndex(t => t.id === editId);
    if (i !== -1) tasks[i] = {...tasks[i], name, color:pickColor, c0, c1, r0, rs};
  } else {
    tasks.push({
      id:    `${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
      wk:    weekKey(monday),
      name, color:pickColor, c0, c1, r0, rs
    });
  }

  saveTasks();
  closeModal();
  render();
}

function doDelete(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// WEEK NAVIGATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

document.getElementById('btnPrev').addEventListener('click', () => {
  monday.setDate(monday.getDate() - 7);
  render();
});

document.getElementById('btnNext').addEventListener('click', () => {
  monday.setDate(monday.getDate() + 7);
  render();
});

document.getElementById('btnAddTask').addEventListener('click', () => {
  const {r, c} = firstFreeCell();
  openAdd(c, r);
});

// Close on backdrop click
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
document.getElementById('iName').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSave();
  document.getElementById('iName').classList.remove('err');
});

// Auto-correct start/end day mismatch in real-time
document.getElementById('iStart').addEventListener('change', () => {
  const s = +document.getElementById('iStart').value;
  const eEl = document.getElementById('iEnd');
  if (+eEl.value < s) eEl.value = s;
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DRAG & RESIZE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// CELL_H stays fixed (grid-template-rows always uses 48px).
// CELL_GAP is a function so it re-reads the CSS custom property each time —
// this means desktop (8px gap) and mobile (4px gap) are always in sync.
const CELL_H   = 48;
const CELL_GAP = () => parseFloat(
  getComputedStyle(document.documentElement).getPropertyValue('--cell-gap')
) || 8;

let drag    = null; // state while a task is being moved
let resize  = null; // state while a task edge is being dragged
let wasDrag = false; // did the pointer actually move enough to count as a drag?

// Returns the grid's position on screen
function gridRect() {
  return document.getElementById('tasksGrid').getBoundingClientRect();
}

// Converts a screen X coordinate → grid column index (0–4)
function colFromClientX(x) {
  const r    = gridRect();
  const gap  = CELL_GAP(); // read live from CSS — adapts to mobile (4px) vs desktop (8px)
  const colW = (r.width - gap * 4) / 5; // width of one column in pixels
  const relX = x - r.left;
  return Math.max(0, Math.min(4, Math.floor(relX / (colW + gap))));
}

// Converts a screen Y coordinate → grid row index (0+)
function rowFromClientY(y) {
  const r    = gridRect();
  const relY = y - r.top;
  return Math.max(0, Math.min(20, Math.floor(relY / (CELL_H + CELL_GAP()))));
}

// ─── Start drag (move) ───────────────────────────────────

function startDrag(e, taskId) {
  if (e.button !== 0) return; // left click only
  if (window.matchMedia('(pointer: coarse)').matches) return; // touch device → open modal instead
  e.preventDefault();

  const task = tasks.find(t => t.id === taskId);
  if (!task) return;

  // Record which column within the task the user grabbed.
  // This makes the task "follow" the cursor from the right spot rather than snapping to its left edge.
  const grabCol = colFromClientX(e.clientX);
  const grabRow = rowFromClientY(e.clientY);
  const colOffset = Math.max(0, Math.min(task.c1 - task.c0, grabCol - task.c0));
  const rowOffset = Math.max(0, grabRow - task.r0);

  drag = {
    taskId,
    startX:    e.clientX, // used to detect real movement (vs. accidental)
    startY:    e.clientY,
    colOffset,
    rowOffset,
    previewC0: task.c0,   // where the preview is currently shown
    previewR0:  task.r0,
    valid:     true,       // false = drop target is blocked
  };
  wasDrag = false;

  document.addEventListener('mousemove', onPointerMove);
  document.addEventListener('mouseup',   onPointerUp);
}

// ─── Start resize (stretch an edge) ─────────────────────

function startResize(e, taskId, dir) {
  if (e.button !== 0) return;
  if (window.matchMedia('(pointer: coarse)').matches) return; // touch device → no resize
  e.stopPropagation(); // prevent startDrag from also firing on the parent task block
  e.preventDefault();

  const task = tasks.find(t => t.id === taskId);
  if (!task) return;

  resize = {
    taskId, dir,          // dir = 'left' | 'right' | 'bottom'
    startX:    e.clientX,
    startY:    e.clientY,
    origC0:    task.c0,   // snapshot of original dimensions
    origC1:    task.c1,
    origR0:    task.r0,
    origRs:    task.rs,
    previewC0: task.c0,   // live preview dimensions (updated on mousemove)
    previewC1: task.c1,
    previewRs: task.rs,
    valid:     true,
  };
  wasDrag = false;

  document.addEventListener('mousemove', onPointerMove);
  document.addEventListener('mouseup',   onPointerUp);
}

// ─── Shared move handler ─────────────────────────────────

function onPointerMove(e) {
  const src = drag || resize;
  if (!src) return;

  // Only activate after moving more than 5px — prevents accidental drags on normal clicks
  if (!wasDrag) {
    const dx = e.clientX - src.startX;
    const dy = e.clientY - src.startY;
    if (dx * dx + dy * dy < 25) return; // 25 = 5px²
    wasDrag = true;
    document.body.style.userSelect = 'none'; // prevent text selection while dragging
    document.body.style.cursor = drag
      ? 'grabbing'
      : (resize.dir === 'bottom' ? 'ns-resize' : 'ew-resize');
    renderGrid(); // first render: show is-dragging state on the task
  }

  if (drag) {
    const task = tasks.find(t => t.id === drag.taskId);
    if (!task) return;
    const span = task.c1 - task.c0; // preserve the column width of the task
    // Clamp so the task can't go off-screen right (newC0 + span must be ≤ 4)
    const newC0 = Math.max(0, Math.min(4 - span, colFromClientX(e.clientX) - drag.colOffset));
    const newR0  = Math.max(0, rowFromClientY(e.clientY) - drag.rowOffset);
    drag.previewC0 = newC0;
    drag.previewR0  = newR0;
    drag.valid = bboxFree(newR0, newC0, newC0 + span, task.rs, drag.taskId);
    renderGrid();
  }

  if (resize) {
    const task = tasks.find(t => t.id === resize.taskId);
    if (!task) return;

    if (resize.dir === 'right') {
      // Dragging right edge → change end day (c1)
      const newC1 = Math.max(resize.origC0, Math.min(4, colFromClientX(e.clientX)));
      resize.previewC1 = newC1;
      resize.valid = bboxFree(resize.origR0, resize.origC0, newC1, resize.origRs, resize.taskId);

    } else if (resize.dir === 'left') {
      // Dragging left edge → change start day (c0)
      const newC0 = Math.max(0, Math.min(resize.origC1, colFromClientX(e.clientX)));
      resize.previewC0 = newC0;
      resize.valid = bboxFree(resize.origR0, newC0, resize.origC1, resize.origRs, resize.taskId);

    } else if (resize.dir === 'bottom') {
      // Dragging bottom edge → change row span (height)
      const newLastRow = Math.max(resize.origR0, rowFromClientY(e.clientY));
      const newRs = newLastRow - resize.origR0 + 1;
      resize.previewRs = newRs;
      resize.valid = bboxFree(resize.origR0, resize.origC0, resize.origC1, newRs, resize.taskId);
    }
    renderGrid();
  }
}

// ─── Shared release handler ──────────────────────────────

function onPointerUp() {
  document.removeEventListener('mousemove', onPointerMove);
  document.removeEventListener('mouseup',   onPointerUp);
  document.body.style.userSelect = '';
  document.body.style.cursor = '';

  // No real movement → treat as a regular click → open the edit modal
  if (!wasDrag && drag) {
    const taskId = drag.taskId;
    drag = null;
    render();
    openEdit(taskId);
    return;
  }

  // Commit drag (move)
  if (drag && drag.valid && wasDrag) {
    const task = tasks.find(t => t.id === drag.taskId);
    if (task) {
      const span = task.c1 - task.c0;
      task.c0 = drag.previewC0;
      task.c1 = drag.previewC0 + span;
      task.r0 = drag.previewR0;
      saveTasks();
    }
  }

  // Commit resize
  if (resize && resize.valid && wasDrag) {
    const task = tasks.find(t => t.id === resize.taskId);
    if (task) {
      task.c0 = resize.previewC0;
      task.c1 = resize.previewC1;
      task.rs = resize.previewRs;
      saveTasks();
    }
  }

  wasDrag = false;
  drag    = null;
  resize  = null;
  render();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SAMPLE DATA  (pre-loaded for current week

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function seedSamples() {
  const key = weekKey(monday);
  if (tasks.some(t => t.wk === key)) return; // don't seed if week already has tasks

  const samples = [
    // name               color       c0 c1  r0 rs
    ['Férias',           '#9c9ebf',   0, 0,  0, 4],
    ['AI Avatars',       '#def1ff',   1, 4,  0, 1],
    ['Catchup férias',   '#f0fac8',   1, 1,  1, 1],
    ['Onboarding OPF',   '#d9faf5',   2, 4,  1, 1],
    ['Suporte Dark mode','#ffe0f2',   1, 1,  2, 1],
    ['Review Handoffs',  '#fcf5c7',   2, 4,  2, 1],
    ['Provas com Claude','#ffdecc',   1, 2,  3, 1],
    ['Loading CHO',      '#ece8ff',   3, 4,  3, 1],
  ];

  samples.forEach(([name, color, c0, c1, r0, rs]) => {
    tasks.push({
      id:   `seed-${Math.random().toString(36).slice(2)}`,
      wk:   key,
      name, color, c0, c1, r0, rs
    });
  });
  saveTasks();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

loadTasks();
seedSamples();
render();

// Background animation handled entirely by CSS @keyframes (shapeFloat1/2 + grainShift).
</script>
