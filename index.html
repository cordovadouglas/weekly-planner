<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #eeeef6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    /* ─── Page wrapper ─── */
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 660px;
    }

    /* ─── Top bar ─── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .top-bar h1 {
      font-size: 22px;
      font-weight: 700;
      color: #282834;
    }

    .print-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: white;
      border: 2px solid #e0e0ee;
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: #646587;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .print-btn:hover { border-color: #9c9ebf; background: #f6f6fc; }

    /* ─── Planner card ─── */
    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      box-shadow: 0 2px 20px rgba(40,40,80,.09);
    }

    /* ─── Week nav ─── */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }
    .week-label {
      font-size: 15px;
      font-weight: 600;
      color: #282834;
    }
    .nav-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 20px;
      color: #646587;
      line-height: 1;
      transition: background .14s;
    }
    .nav-btn:hover { background: #f0f0f8; }

    /* ─── Day headers ─── */
    .days-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .day-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 4px;
      border-radius: 8px;
    }
    .day-header.today { background: #f0f0f8; }
    .day-name {
      font-size: 10px;
      font-weight: 700;
      color: #b0b0cc;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 2px;
    }
    .day-date {
      font-size: 18px;
      font-weight: 600;
      color: #646587;
      font-feature-settings: 'case';
    }
    .day-header.today .day-date { color: #282834; }

    /* ─── Tasks grid ─── */
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    /* ─── Task block ─── */
    .task-block {
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 6px;
      cursor: pointer;
      position: relative;
      min-height: 48px;
      transition: filter .12s;
    }
    .task-block:hover { filter: brightness(.93); }

    .task-name {
      font-size: 13px;
      font-weight: 600;
      color: #282834;
      text-align: center;
      word-break: break-word;
      line-height: 1.35;
      font-feature-settings: 'case';
    }

    /* delete × shown on hover */
    .del-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(0,0,0,.13);
      border: none;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #282834;
      line-height: 1;
    }
    .task-block:hover .del-btn { display: flex; }

    /* ─── Empty add-cell ─── */
    .add-cell {
      min-height: 48px;
      border-radius: 6px;
      border: 2px dashed #e0e0ee;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .12s, border-color .12s;
    }
    .add-cell:hover { background: #f6f6fc; border-color: #9c9ebf; }
    .add-cell-icon { font-size: 18px; font-weight: 300; color: #cccce0; transition: color .12s; }
    .add-cell:hover .add-cell-icon { color: #9c9ebf; }

    /* ─── Footer button ─── */
    .footer-row { display: flex; justify-content: center; }
    .add-task-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 11px 26px;
      background: #282834;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: opacity .14s;
    }
    .add-task-btn:hover { opacity: .8; }

    /* ─── Modal overlay ─── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(30,30,50,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      padding: 16px;
      backdrop-filter: blur(3px);
    }
    .overlay.hidden { display: none; }

    /* ─── Modal card ─── */
    .modal {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 12px 48px rgba(30,30,50,.18);
      animation: popIn .15s ease-out;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.96) translateY(6px); }
      to   { opacity: 1; transform: scale(1)   translateY(0);   }
    }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: #282834;
      margin-bottom: 20px;
    }

    /* ─── Form elements ─── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #9c9ebf;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 6px;
    }
    .field input,
    .field select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e8e8f0;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 600;
      color: #282834;
      background: white;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color .14s;
    }
    .field input:focus,
    .field select:focus { border-color: #9c9ebf; }
    .field input.err { border-color: #ff4466; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ─── Color swatches ─── */
    .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
    .swatch {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform .1s, border-color .1s;
    }
    .swatch:hover { transform: scale(1.1); }
    .swatch.active { border-color: #282834; transform: scale(1.05); }

    /* ─── Modal actions ─── */
    .actions { display: flex; gap: 8px; margin-top: 20px; }
    .btn {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: opacity .12s;
    }
    .btn:hover { opacity: .8; }
    .btn-dark   { background: #282834; color: white; }
    .btn-ghost  { background: #f0f0f8; color: #646587; }
    .btn-danger { background: #ffe0f2; color: #c0185e; }

    /* ─── Print ─── */
    @media print {
      body { background: white; padding: 12px; }
      .page { max-width: 100%; }
      .top-bar .print-btn,
      .footer-row,
      .nav-btn,
      .del-btn,
      .add-cell { display: none !important; }
      .card { box-shadow: none; border: 1px solid #e0e0ee; }
      .task-block { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Top bar -->
  <div class="top-bar">
    <h1>Weekly Planner</h1>
    <button class="print-btn" onclick="window.print()">
      <!-- printer icon -->
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M4 5V2h8v3M4 12H2V7h12v5h-2M4 12v2h8v-2M4 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Print
    </button>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- Week navigation -->
    <div class="week-nav">
      <button class="nav-btn" id="btnPrev" title="Previous week">&#8249;</button>
      <span class="week-label" id="weekLabel"></span>
      <button class="nav-btn" id="btnNext" title="Next week">&#8250;</button>
    </div>

    <!-- Day headers -->
    <div class="days-row" id="daysRow"></div>

    <!-- Task grid -->
    <div class="tasks-grid" id="tasksGrid"></div>

  </div>

  <!-- Add task button -->
  <div class="footer-row">
    <button class="add-task-btn" id="btnAddTask">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Add Task
    </button>
  </div>

</div><!-- .page -->


<!-- ─── Modal ─── -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <p class="modal-title" id="modalTitle">Add Task</p>

    <div class="field">
      <label for="iName">Task name</label>
      <input id="iName" type="text" placeholder="e.g. Design Review" autocomplete="off" />
    </div>

    <div class="field">
      <label>Color</label>
      <div class="swatches" id="swatches"></div>
    </div>

    <div class="two-col">
      <div class="field">
        <label for="iStart">Start day</label>
        <select id="iStart">
          <option value="0">Monday</option>
          <option value="1">Tuesday</option>
          <option value="2">Wednesday</option>
          <option value="3">Thursday</option>
          <option value="4">Friday</option>
        </select>
      </div>
      <div class="field">
        <label for="iEnd">End day</label>
        <select id="iEnd">
          <option value="0">Monday</option>
          <option value="1">Tuesday</option>
          <option value="2">Wednesday</option>
          <option value="3">Thursday</option>
          <option value="4">Friday</option>
        </select>
      </div>
    </div>

    <div class="two-col">
      <div class="field">
        <label for="iRow">Row</label>
        <select id="iRow" id="iRow"></select>
      </div>
      <div class="field">
        <label for="iSpan">Height</label>
        <select id="iSpan">
          <option value="1">1 row</option>
          <option value="2">2 rows</option>
          <option value="3">3 rows</option>
          <option value="4">4 rows</option>
        </select>
      </div>
    </div>

    <div class="actions" id="actions"></div>
  </div>
</div><!-- .overlay -->


<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONSTANTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const PALETTE = [
  { name:'Bluebell',  hex:'#def1ff' },
  { name:'Mint',      hex:'#d9faf5' },
  { name:'Lemon',     hex:'#f0fac8' },
  { name:'Sunflower', hex:'#fcf5c7' },
  { name:'Peach',     hex:'#ffdecc' },
  { name:'Rose',      hex:'#ffe0f2' },
  { name:'Lavender',  hex:'#ece8ff' },
  { name:'Gray',      hex:'#9c9ebf' },
];

const DAY_NAMES  = ['Seg','Ter','Qua','Qui','Sex'];
const PT_MONTHS  = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const NUM_ROWS   = 8; // max selectable rows
const STORAGE_KEY = 'weeklyPlanner_v2';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

let monday    = getMonday(new Date()); // current week start
let tasks     = [];                    // all tasks (all weeks)
let editId    = null;                  // id of task being edited; null = new
let pickColor = PALETTE[0].hex;        // currently selected color in modal

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PERSISTENCE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function loadTasks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) tasks = JSON.parse(raw);
  } catch(e) { tasks = []; }
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DATE HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function getMonday(d) {
  const date = new Date(d);
  date.setHours(0,0,0,0);
  const day = date.getDay();              // 0=Sun, 1=Mon…
  date.setDate(date.getDate() - (day === 0 ? 6 : day - 1));
  return date;
}

function weekDates(mon) {
  return Array.from({length:5}, (_,i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function fmt(d) {
  return `${d.getDate()}/${PT_MONTHS[d.getMonth()]}`;
}

function weekKey(mon) {
  return mon.toISOString().slice(0,10); // "YYYY-MM-DD"
}

function weekRangeLabel(mon) {
  const ds = weekDates(mon);
  const a = ds[0], b = ds[4];
  if (a.getMonth() === b.getMonth())
    return `${a.getDate()} – ${b.getDate()} de ${PT_MONTHS[a.getMonth()]}`;
  return `${fmt(a)} – ${fmt(b)}`;
}

function isToday(d) {
  const t = new Date();
  return d.getDate()  === t.getDate()  &&
         d.getMonth() === t.getMonth() &&
         d.getFullYear() === t.getFullYear();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TASK HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function weekTasks() {
  return tasks.filter(t => t.wk === weekKey(monday));
}

// Is cell (row r, col c) occupied? Optionally exclude one task id.
function cellOccupied(r, c, excludeId=null) {
  return weekTasks().some(t => {
    if (t.id === excludeId) return false;
    return c >= t.c0 && c <= t.c1 &&
           r >= t.r0 && r < t.r0 + t.rs;
  });
}

// Is the whole bounding box free?
function bboxFree(r0, c0, c1, rs, excludeId=null) {
  for (let r = r0; r < r0+rs; r++)
    for (let c = c0; c <= c1; c++)
      if (cellOccupied(r, c, excludeId)) return false;
  return true;
}

// Find first free cell scanning row-by-row
function firstFreeCell() {
  for (let r = 0; r < NUM_ROWS; r++)
    for (let c = 0; c < 5; c++)
      if (!cellOccupied(r, c)) return {r, c};
  return {r: NUM_ROWS, c: 0};
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function render() {
  renderWeekLabel();
  renderDays();
  renderGrid();
}

function renderWeekLabel() {
  document.getElementById('weekLabel').textContent = weekRangeLabel(monday);
}

function renderDays() {
  const ds = weekDates(monday);
  document.getElementById('daysRow').innerHTML = ds.map((d,i) => `
    <div class="day-header ${isToday(d)?'today':''}">
      <div class="day-name">${DAY_NAMES[i]}</div>
      <div class="day-date">${fmt(d)}</div>
    </div>
  `).join('');
}

function renderGrid() {
  const grid = document.getElementById('tasksGrid');
  const wt   = weekTasks();

  // How many rows to show (at least 4)
  const maxUsedRow = wt.length ? Math.max(...wt.map(t => t.r0 + t.rs - 1)) : 3;
  const rows = Math.max(4, maxUsedRow + 1);

  grid.style.gridTemplateRows = `repeat(${rows}, 48px)`;

  // Build occupancy map
  const occ = Array.from({length: rows}, () => new Array(5).fill(false));
  wt.forEach(t => {
    for (let r = t.r0; r < t.r0+t.rs && r < rows; r++)
      for (let c = t.c0; c <= t.c1 && c < 5; c++)
        occ[r][c] = true;
  });

  let html = '';

  // Render task blocks
  wt.forEach(t => {
    const cs = t.c0 + 1;
    const ce = t.c1 - t.c0 + 1;
    const rs = t.r0 + 1;
    html += `
      <div class="task-block"
           style="background:${t.color}; grid-column:${cs}/span ${ce}; grid-row:${rs}/span ${t.rs};"
           onclick="openEdit('${t.id}')">
        <span class="task-name">${esc(t.name)}</span>
        <button class="del-btn" title="Delete"
                onclick="event.stopPropagation(); doDelete('${t.id}')">×</button>
      </div>`;
  });

  // Render empty cells
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < 5; c++)
      if (!occ[r][c])
        html += `
          <div class="add-cell"
               style="grid-column:${c+1}; grid-row:${r+1};"
               onclick="openAdd(${c},${r})">
            <span class="add-cell-icon">+</span>
          </div>`;

  grid.innerHTML = html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ROW SELECT (dynamic)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function buildRowSelect(selectedRow) {
  const sel = document.getElementById('iRow');
  sel.innerHTML = Array.from({length: NUM_ROWS}, (_,i) =>
    `<option value="${i}" ${i===selectedRow?'selected':''}>Row ${i+1}</option>`
  ).join('');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// COLOR SWATCHES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function renderSwatches() {
  document.getElementById('swatches').innerHTML = PALETTE.map(p => `
    <div class="swatch ${pickColor===p.hex?'active':''}"
         style="background:${p.hex};"
         title="${p.name}"
         onclick="selectColor('${p.hex}')"></div>
  `).join('');
}

function selectColor(hex) {
  pickColor = hex;
  renderSwatches();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MODAL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function openAdd(col=0, row=0) {
  editId = null;
  document.getElementById('modalTitle').textContent = 'Add Task';
  document.getElementById('iName').value = '';
  document.getElementById('iName').classList.remove('err');
  document.getElementById('iStart').value = col;
  document.getElementById('iEnd').value   = col;
  buildRowSelect(row);
  document.getElementById('iSpan').value  = 1;
  pickColor = PALETTE[0].hex;
  renderSwatches();
  document.getElementById('actions').innerHTML = `
    <button class="btn btn-ghost"  onclick="closeModal()">Cancel</button>
    <button class="btn btn-dark"   onclick="doSave()">Add</button>
  `;
  showOverlay();
}

function openEdit(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  editId = id;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('iName').value  = t.name;
  document.getElementById('iName').classList.remove('err');
  document.getElementById('iStart').value = t.c0;
  document.getElementById('iEnd').value   = t.c1;
  buildRowSelect(t.r0);
  document.getElementById('iSpan').value  = t.rs;
  pickColor = t.color;
  renderSwatches();
  document.getElementById('actions').innerHTML = `
    <button class="btn btn-danger" onclick="doDelete('${id}');closeModal()">Delete</button>
    <button class="btn btn-ghost"  onclick="closeModal()">Cancel</button>
    <button class="btn btn-dark"   onclick="doSave()">Save</button>
  `;
  showOverlay();
}

function showOverlay() {
  document.getElementById('overlay').classList.remove('hidden');
  requestAnimationFrame(() => {
    const inp = document.getElementById('iName');
    inp.focus(); inp.select();
  });
}

function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
  editId = null;
}

function doSave() {
  const name = document.getElementById('iName').value.trim();
  if (!name) {
    const inp = document.getElementById('iName');
    inp.classList.add('err');
    inp.focus();
    return;
  }

  let c0 = parseInt(document.getElementById('iStart').value);
  let c1 = parseInt(document.getElementById('iEnd').value);
  if (c1 < c0) c1 = c0; // auto-correct reversed range

  const r0 = parseInt(document.getElementById('iRow').value);
  const rs  = parseInt(document.getElementById('iSpan').value);

  // Collision check
  if (!bboxFree(r0, c0, c1, rs, editId)) {
    alert('That space overlaps with another task.\nChoose a different row or days.');
    return;
  }

  if (editId) {
    const i = tasks.findIndex(t => t.id === editId);
    if (i !== -1) tasks[i] = {...tasks[i], name, color:pickColor, c0, c1, r0, rs};
  } else {
    tasks.push({
      id:    `${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
      wk:    weekKey(monday),
      name, color:pickColor, c0, c1, r0, rs
    });
  }

  saveTasks();
  closeModal();
  render();
}

function doDelete(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// WEEK NAVIGATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

document.getElementById('btnPrev').addEventListener('click', () => {
  monday.setDate(monday.getDate() - 7);
  render();
});

document.getElementById('btnNext').addEventListener('click', () => {
  monday.setDate(monday.getDate() + 7);
  render();
});

document.getElementById('btnAddTask').addEventListener('click', () => {
  const {r, c} = firstFreeCell();
  openAdd(c, r);
});

// Close on backdrop click
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
document.getElementById('iName').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSave();
  document.getElementById('iName').classList.remove('err');
});

// Auto-correct start/end day mismatch in real-time
document.getElementById('iStart').addEventListener('change', () => {
  const s = +document.getElementById('iStart').value;
  const eEl = document.getElementById('iEnd');
  if (+eEl.value < s) eEl.value = s;
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SAMPLE DATA  (pre-loaded for current week
// so you can see the design right away —
// feel free to edit or delete any of these)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function seedSamples() {
  const key = weekKey(monday);
  if (tasks.some(t => t.wk === key)) return; // don't seed if week already has tasks

  const samples = [
    // name               color       c0 c1  r0 rs
    ['Férias',           '#9c9ebf',   0, 0,  0, 4],
    ['AI Avatars',       '#def1ff',   1, 4,  0, 1],
    ['Catchup férias',   '#f0fac8',   1, 1,  1, 1],
    ['Onboarding OPF',   '#d9faf5',   2, 4,  1, 1],
    ['Suporte Dark mode','#ffe0f2',   1, 1,  2, 1],
    ['Review Handoffs',  '#fcf5c7',   2, 4,  2, 1],
    ['Provas com Claude','#ffdecc',   1, 2,  3, 1],
    ['Loading CHO',      '#ece8ff',   3, 4,  3, 1],
  ];

  samples.forEach(([name, color, c0, c1, r0, rs]) => {
    tasks.push({
      id:   `seed-${Math.random().toString(36).slice(2)}`,
      wk:   key,
      name, color, c0, c1, r0, rs
    });
  });
  saveTasks();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

loadTasks();
seedSamples();
render();
</script>
